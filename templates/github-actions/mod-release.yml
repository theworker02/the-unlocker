name: mod-release

on:
  push:
    tags:
      - "v*"

jobs:
  package-mod:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build
        run: dotnet build
      - name: Validate
        run: dotnet run --project tools/TheUnlocker.ModPackager -- validate .
      - name: Package
        run: dotnet run --project tools/TheUnlocker.ModPackager -- package . artifacts
      - name: Sign
        run: dotnet run --project tools/TheUnlocker.ModPackager -- sign artifacts ${{ secrets.MOD_PRIVATE_KEY_PATH }}
      - uses: actions/upload-artifact@v4
        with:
          name: packaged-mod
          path: artifacts
